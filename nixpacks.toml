[providers]
providers = ["python"]

[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "pkgs.postgresql"]

[phases.build]
dependsOn = ["setup"]
cmds = ["cd backend && pip install -r requirements.txt && python manage.py collectstatic --noinput"]

[start]
cmd = "cd backend && python manage.py migrate --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
